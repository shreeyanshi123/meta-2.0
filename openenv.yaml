# OpenEnv Environment Manifest — https://openenv.dev/spec/v1
version: "1.0"

environment:
  name: tribunal-env
  version: "1.0.0"
  theme: multi-agent-interactions
  description: >-
    Four specialised AI workers complete tasks while a hidden failure injector
    probabilistically corrupts outputs via hallucination, collusion, manipulation,
    or silence. A Judge LLM must identify misbehaving workers, classify the failure
    type, and explain its reasoning — scored on a 6-component rubric designed to
    resist RL reward hacking.
  base_image: "python:3.11-slim"
  entrypoint: "tribunal.server:app"
  port: 7860

  env_vars:
    TRIBUNAL_SEED: "42"
    TRIBUNAL_EPISODES: "5"
    TRIBUNAL_FAILURE_RATE: "0.6"
    TRIBUNAL_HOST: "0.0.0.0"
    TRIBUNAL_PORT: "7860"
    TRIBUNAL_LOG_LEVEL: "INFO"

  endpoints:
    reset:
      method: POST
      path: /reset
      description: "Reset the environment and return the first Observation."
    step:
      method: POST
      path: /step
      description: "Submit a JudgeVerdict and receive the next Observation + reward."
    state:
      method: GET
      path: /state
      description: "Return current environment state snapshot."
    health:
      method: GET
      path: /health
      description: "Health check with version and round index."
    info:
      method: GET
      path: /info
      description: "Environment metadata for judges."
    stream:
      method: GET
      path: /stream/rounds
      description: "Server-Sent Events stream of completed rounds for live UI."

  observation_schema:
    type: object
    properties:
      round_id: { type: string }
      task_briefs_public: { type: array }
      worker_outputs: { type: array }
      round_index: { type: integer }

  action_schema:
    type: object
    properties:
      verdict:
        type: object
        properties:
          accused: { type: array, items: { type: integer } }
          failure_types: { type: object }
          explanation: { type: string }
          per_worker_confidence: { type: object }

  metadata:
    authors:
      - "Hackathon Team"
    license: "MIT"
    links:
      github: "https://github.com/shreeyanshi123/meta-2.0"
      colab: "https://colab.research.google.com/github/shreeyanshi123/meta-2.0/blob/main/notebooks/train_grpo.ipynb"
      space: "https://huggingface.co/spaces/shreeyanshi123/tribunal-env"
      blog: "https://huggingface.co/blog/shreeyanshi123/tribunal-env"
