version: "3.9"

services:
  tribunal:
    build: .
    ports:
      - "7860:7860"
    environment:
      - TRIBUNAL_SEED=42
      - TRIBUNAL_EPISODES=5
      - TRIBUNAL_FAILURE_RATE=0.6
      - TRIBUNAL_HOST=0.0.0.0
      - TRIBUNAL_PORT=7860
    volumes:
      - ./src:/app/src
      - ./shared:/app/shared
      - ./client:/app/client
    restart: unless-stopped
