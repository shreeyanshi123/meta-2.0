version: "3.9"

services:
  tribunal:
    build: .
    ports:
      - "8000:8000"
    environment:
      - TRIBUNAL_SEED=42
      - TRIBUNAL_EPISODES=5
      - TRIBUNAL_FAILURE_RATE=0.6
      - TRIBUNAL_HOST=0.0.0.0
      - TRIBUNAL_PORT=8000
    volumes:
      - ./src:/app/src
      - ./dashboard:/app/dashboard
    restart: unless-stopped
